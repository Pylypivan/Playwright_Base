name: Run All Tests

on:
  workflow_dispatch:
    inputs:
      branch:
        description: Branch to run tests on
        required: true
        default: main
        type: string
      environment:
        description: Environment to run tests against
        required: true
        type: choice
        default: staging
        options:
          - staging
          - production
          - dev

jobs:
  regression:
    uses: ./.github/workflows/_suite.yml
    with:
      suite: regression
      branch: ${{ inputs.branch }}
      environment: ${{ inputs.environment }}

  sanity:
    uses: ./.github/workflows/_suite.yml
    with:
      suite: sanity
      branch: ${{ inputs.branch }}
      environment: ${{ inputs.environment }}

  budget:
    uses: ./.github/workflows/_suite.yml
    with:
      suite: budget
      branch: ${{ inputs.branch }}
      environment: ${{ inputs.environment }}

  publish:
    name: Publish Reports
    needs: [regression, sanity, budget]
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Download regression report
        uses: actions/download-artifact@v4
        with:
          name: regression-report
          path: ./site/regression

      - name: Download sanity report
        uses: actions/download-artifact@v4
        with:
          name: sanity-report
          path: ./site/sanity

      - name: Download budget report
        uses: actions/download-artifact@v4
        with:
          name: budget-report
          path: ./site/budget

      - name: Create index page
        run: |
          cat > ./site/index.html << 'EOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8" />
            <title>Test Reports</title>
            <style>
              body { font-family: sans-serif; max-width: 480px; margin: 60px auto; }
              h1 { font-size: 1.4rem; margin-bottom: 24px; }
              ul { list-style: none; padding: 0; }
              li { margin: 12px 0; }
              a { font-size: 1rem; color: #0969da; text-decoration: none; }
              a:hover { text-decoration: underline; }
            </style>
          </head>
          <body>
            <h1>Test Reports</h1>
            <ul>
              <li><a href="regression/index.html">Regression</a></li>
              <li><a href="sanity/index.html">Sanity</a></li>
              <li><a href="budget/index.html">Budget</a></li>
            </ul>
          </body>
          </html>
          EOF

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4

name: Run Selected Test
run-name: "Run Selected Test [env: ${{ inputs.environment }}]"

on:
  workflow_dispatch:
    inputs:
      branch:
        description: Branch to run tests on
        required: true
        default: main
        type: string
      environment:
        description: Environment to run tests against
        required: true
        type: choice
        default: staging
        options:
          - staging
          - production
          - dev
      test:
        description: "Test file or path (e.g. tests/sanity/ui.spec.js)"
        required: true
        type: string
      tag:
        description: "Tag to grep (e.g. @sanity) — optional"
        required: false
        type: string

jobs:
  run:
    name: Run Selected Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Create auth directory
        run: mkdir -p playwright/.auth

      - name: Run selected tests
        run: |
          CMD="npx playwright test"
          if [ -n "${{ inputs.test }}" ]; then
            CMD="$CMD ${{ inputs.test }}"
          fi
          if [ -n "${{ inputs.tag }}" ]; then
            CMD="$CMD --grep ${{ inputs.tag }}"
          fi
          $CMD --reporter=html,list
        env:
          TEST_ENV: ${{ inputs.environment }}

      - name: Upload report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: selected-test-report
          path: playwright-report/
          retention-days: 7

name: Suite Runner

on:
  workflow_call:
    inputs:
      suite:
        required: true
        type: string
      branch:
        required: true
        type: string
      environment:
        required: true
        type: string

jobs:
  run:
    name: ${{ inputs.suite }} / Shard ${{ matrix.shard }}/5
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4, 5]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Create auth directory
        run: mkdir -p playwright/.auth

      - name: Run ${{ inputs.suite }} tests
        run: npx playwright test --grep @${{ inputs.suite }} --shard=${{ matrix.shard }}/5 --reporter=blob
        env:
          TEST_ENV: ${{ inputs.environment }}

      - name: Upload blob report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ${{ inputs.suite }}-blob-${{ matrix.shard }}
          path: blob-report/
          retention-days: 1

  merge:
    name: Merge ${{ inputs.suite }} Report
    needs: run
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Download blob reports
        uses: actions/download-artifact@v4
        with:
          pattern: ${{ inputs.suite }}-blob-*
          path: all-blobs
          merge-multiple: true

      - name: Merge reports
        run: npx playwright merge-reports --reporter=html ./all-blobs

      - name: Upload merged report
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.suite }}-report
          path: playwright-report/
          retention-days: 7

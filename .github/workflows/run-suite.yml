name: Run Suite
run-name: "Run Suite ${{ inputs.suite }} [env: ${{ inputs.environment }}]"

on:
  workflow_dispatch:
    inputs:
      branch:
        description: Branch to run tests on
        required: true
        default: main
        type: string
      environment:
        description: Environment to run tests against
        required: true
        type: choice
        default: staging
        options:
          - staging
          - production
          - dev
      suite:
        description: Test suite to run
        required: true
        type: choice
        options:
          - regression
          - sanity
          - budget

jobs:
  run:
    name: ${{ inputs.suite }}
    uses: ./.github/workflows/_suite.yml
    with:
      suite: ${{ inputs.suite }}
      branch: ${{ inputs.branch }}
      environment: ${{ inputs.environment }}

  publish:
    name: Publish Report
    needs: run
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Download report
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.suite }}-report
          path: ./site

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
